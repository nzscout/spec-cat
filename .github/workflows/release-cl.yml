name: Create CL Release

# Triggered automatically by sync-upstream.yml when it pushes a v*-cl* tag.
# Builds the wheel from cl/main, fetches upstream release notes, and publishes
# a GitHub Release with the built artifacts.

on:
  push:
    tags:
      - 'v*-cl*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Extract version info
        id: versions
        run: |
          CL_TAG="${GITHUB_REF#refs/tags/}"
          # Strip -cl* suffix to get the upstream tag (handles cl1, cl1.1, cl1.2)
          UPSTREAM_TAG=$(echo "$CL_TAG" | sed 's/-cl[0-9][0-9.]*$//')
          echo "cl_tag=$CL_TAG" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"
          echo "CL tag: $CL_TAG  |  Upstream tag: $UPSTREAM_TAG"

      - name: Build wheel and sdist
        run: uv build

      - name: Fetch upstream release notes
        id: upstream_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_TAG="${{ steps.versions.outputs.upstream_tag }}"
          NOTES=$(gh release view "$UPSTREAM_TAG" \
            --repo github/spec-kit \
            --json body -q '.body' 2>/dev/null || echo "_Upstream release notes not available._")
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: release_notes
        run: |
          CL_TAG="${{ steps.versions.outputs.cl_tag }}"
          UPSTREAM_TAG="${{ steps.versions.outputs.upstream_tag }}"

          # CL commits since last CL tag (anything not in upstream)
          PREV_CL_TAG=$(git tag --list 'v*-cl*' --sort=-version:refname \
            | grep -v "^${CL_TAG}$" | head -1)
          if [ -n "$PREV_CL_TAG" ]; then
            CL_COMMITS=$(git log --oneline --pretty=format:"- %s" --no-merges \
              "$PREV_CL_TAG"..HEAD -- \
              'cl-tools/' 'src/specify_cli/cl_commands.py' '.github/workflows/sync-upstream.yml' \
              '.github/workflows/release-cl.yml' 2>/dev/null || true)
          else
            CL_COMMITS=""
          fi

          {
            echo "body<<EOF"
            echo "## Install"
            echo ""
            echo '```bash'
            echo "uv tool install specify-cli --force --from git+https://github.com/nzscout/spec-cat.git@${CL_TAG}"
            echo '```'
            echo ""
            echo "## What's in this release"
            echo ""
            echo "Based on upstream [${UPSTREAM_TAG}](https://github.com/github/spec-kit/releases/tag/${UPSTREAM_TAG}) with CL customizations:"
            echo "- \`speckit init\` CLI command — runs \`specify init\` + patches + extras in one step"
            echo "- Anchor-based post-init patches for the \`specify\` agent command"
            echo "- Extra agent files: reviewer, comparer, context7"
            echo ""
            if [ -n "$CL_COMMITS" ]; then
              echo "### CL changes since previous release"
              echo ""
              echo "$CL_COMMITS"
              echo ""
            fi
            echo "## Upstream release notes"
            echo ""
            echo "${{ steps.upstream_notes.outputs.notes }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CL_TAG="${{ steps.versions.outputs.cl_tag }}"
          UPSTREAM_TAG="${{ steps.versions.outputs.upstream_tag }}"
          gh release create "$CL_TAG" \
            dist/* \
            --title "specify-cli ${CL_TAG} (based on ${UPSTREAM_TAG})" \
            --notes "${{ steps.release_notes.outputs.body }}"
