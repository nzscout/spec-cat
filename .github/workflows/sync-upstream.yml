name: Sync upstream spec-kit

# Runs weekly and on-demand.
#
# Branch model:
#   main     — clean mirror of upstream github/spec-kit. Never has custom code.
#   cl/main  — CL customizations rebased on top of main. This is the install branch.
#
# What this workflow does:
#   1. Fast-forward `main` to upstream/main (never conflicts — no custom code on main)
#   2. Rebase `cl/main` onto updated `main`
#   3. If there were upstream changes, create a PR from a `sync/upstream-*` branch
#      against `cl/main` so changes can be reviewed before cl/main is updated.
#
# Install command: uv tool install specify-cli --from git+https://github.com/nzscout/spec-cat.git@cl/main

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 09:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (cl/main)
        uses: actions/checkout@v4
        with:
          ref: cl/main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/github/spec-kit.git || true
          git fetch upstream main --tags
          git fetch origin main

      - name: Check if upstream has new commits
        id: diff
        run: |
          BEHIND=$(git rev-list origin/main..upstream/main --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commit(s) ahead of fork main"

      - name: Nothing to do
        if: steps.diff.outputs.behind == '0'
        run: echo "Fork main is already up to date with upstream. No PR needed."

      - name: Fast-forward origin/main to upstream/main
        if: steps.diff.outputs.behind != '0'
        run: |
          git checkout main
          git reset --hard upstream/main
          git push origin main
          git checkout cl/main

      - name: Create sync branch off cl/main and rebase onto updated main
        if: steps.diff.outputs.behind != '0'
        id: branch
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d-%H%M)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH"
          git rebase origin/main

      - name: Verify patch anchors (dry-run on a temp copy)
        if: steps.diff.outputs.behind != '0'
        id: patch_check
        shell: pwsh
        run: |
          $anchorWarnings = @()

          $templateFile = "templates/commands/specify.md"
          if (Test-Path $templateFile) {
              $content = Get-Content $templateFile -Raw

              if ($content -notmatch '1\. \*\*Generate a concise short name\*\*') {
                  $anchorWarnings += "specify step-1 anchor not found in upstream template"
              }
              if ($content -notmatch '2\. \*\*Create the feature branch\*\* by running') {
                  $anchorWarnings += "specify step-2 anchor not found in upstream template"
              }
          } else {
              $anchorWarnings += "templates/commands/specify.md not found"
          }

          if ($anchorWarnings.Count -gt 0) {
              Write-Host "::warning::PATCH ANCHOR CHECK FAILED:"
              $anchorWarnings | ForEach-Object { Write-Host "::warning::  - $_" }
              "anchor_ok=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
              Write-Host "All patch anchors verified OK"
              "anchor_ok=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Push sync branch
        if: steps.diff.outputs.behind != '0'
        run: git push origin "${{ steps.branch.outputs.branch }}"

      - name: Create pull request into cl/main
        if: steps.diff.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ANCHOR_STATUS="${{ steps.patch_check.outputs.anchor_ok }}"
          BEHIND="${{ steps.diff.outputs.behind }}"

          if [ "$ANCHOR_STATUS" = "false" ]; then
            ANCHOR_NOTICE="
          > [!WARNING]
          > **Patch anchor check failed.** One or more anchors in \`cl-tools/patches/apply.ps1\` no longer match the upstream template. Update the \`StartAnchor\` or \`EndAnchor\` strings before merging, then re-run \`apply.ps1\` in your target repos."
          else
            ANCHOR_NOTICE="
          > [!NOTE]
          > Patch anchors verified OK — \`cl-tools/patches/apply.ps1\` will apply cleanly after \`specify init\`."
          fi

          gh pr create \
            --title "chore: sync upstream spec-kit ($(date +%Y-%m-%d), +${BEHIND} commits)" \
            --body "## Upstream sync

          Automated rebase of \`cl/main\` onto updated [\`github/spec-kit\` main](https://github.com/github/spec-kit).

          **Commits merged:** ${BEHIND}
          ${ANCHOR_NOTICE}

          ### What happened
          - \`main\` was fast-forwarded to \`upstream/main\` (clean mirror, no custom code)
          - \`cl/main\` customizations were rebased onto the updated \`main\`
          - This PR targets \`cl/main\` — merge it to complete the update

          ### Review checklist
          - [ ] Review upstream changelog / new features
          - [ ] Confirm rebase applied cleanly (no conflicts expected — CL files don't overlap upstream files)
          - [ ] If anchor warning above: update \`cl-tools/patches/apply.ps1\` anchor strings and snippets
          - [ ] After merge: tag a new fork release so projects can pin to a version
          " \
            --base cl/main \
            --head "${{ steps.branch.outputs.branch }}"
